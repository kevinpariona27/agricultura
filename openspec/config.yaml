schema: spec-driven

context: |
  Intended stack: React (JavaScript/TypeScript) single-page application
  Domain: Agricultural management ("gestión agrícola")
  Project state: Unbootstrapped — no package.json, source files, or toolchain yet
  Architecture: Undetermined (bootstrapping pending)
  Style: Undetermined (convention pending)

rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns
    tdd: false
    test_command: ""
  verify:
    test_command: ""
    build_command: ""
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas

testing:
  strict_tdd: false
  reason: No test runner, linter, or toolchain detected — project is unbootstrapped
  detected: 2026-07-08
  runner:
    framework: None
    command: ""
  layers:
    unit: false
    integration: false
    e2e: false
