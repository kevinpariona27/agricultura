schema: spec-driven

context: |
  Stack: React 19 + Vite 6 + Tailwind CSS 4 (client), Node.js/Express + Knex + SQLite (server), TypeScript shared types
  Architecture: Monorepo (npm workspaces) — @agri/server, @agri/client, @agri/shared
  Domain: Agricultural management — parcels, crops, irrigation, fertilization, pests, harvests, inventory, auth
  Testing: Vitest 4 (unit+integration), Supertest (server), Testing Library + jsdom (client), @vitest/coverage-v8
  Quality: TypeScript strict mode; no linter or formatter configured

rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns
    tdd: false
    test_command: ""
  verify:
    test_command: "npm run test --workspace=server; if ($?) { npm run test --workspace=client }"
    build_command: "npm run build --workspace=server; if ($?) { npm run build --workspace=client }"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas

testing:
  strict_tdd: true
  reason: Test runners detected (Vitest 4 in server + client), prior config based on stale unbootstrapped state — defaulting to strict TDD
  detected: 2026-07-13
  runner:
    framework: Vitest
    command: "vitest run"
  layers:
    unit: true
    integration: true
    e2e: false
  coverage:
    available: true
    command: "vitest run --coverage"
  quality:
    linter: false
    type_checker: true
    formatter: false
