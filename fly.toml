# fly.toml — Auto-generated by SDD mobile-ready
app = "agri-gestion"

[build]
  dockerfile = "Dockerfile"

[env]
  DB_PATH = "/app/server/data/data.db"

[[services]]
  internal_port = 3001
  force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[services.tcp_checks]]
    port = 3001
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"

[[mounts]]
  source = "data"
  destination = "/app/server/data"
  size = "1"
