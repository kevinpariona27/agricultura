services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      - CORS_ORIGIN=*
      - JWT_SECRET=${JWT_SECRET:-agroexec-dev-secret-change-me}
      - PORT=3001
      - DB_PATH=/app/data/data.db
    volumes:
      - server-data:/app/data

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    depends_on:
      - server

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - server
      - client

volumes:
  server-data:
