<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#15803D" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='4' fill='%2315803D'/%3E%3Cpath d='M16 6c1.5 0 3 1.5 4 4 .5 1 1 2 1 3.5 0 2-1.3 4-2.5 5.5C17.5 20.5 16 22 16 24c0-2-1.5-3.5-2.5-5C12.3 17.5 11 15.5 11 13.5c0-1.5.5-2.5 1-3.5 1-2.5 2.5-4 4-4z' fill='white'/%3E%3C/svg%3E" />
    <title>Gestión Agrícola</title>
    <style>
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #15803D;
        color: white;
        font-family: 'Fira Sans', 'Inter', system-ui, sans-serif;
        transition: opacity 0.4s ease;
      }
      #splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #splash svg {
        width: 64px;
        height: 64px;
        margin-bottom: 1rem;
        animation: splash-pulse 1.5s ease-in-out infinite;
      }
      #splash h1 {
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: -0.025em;
        margin: 0;
      }
      #splash p {
        font-size: 0.875rem;
        opacity: 0.8;
        margin-top: 0.5rem;
      }
      @keyframes splash-pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.08); opacity: 0.9; }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
        <path d="M16 4c2 0 3.5 1.5 5 5 .5 1.2 1 2.5 1 4 0 2.5-1.5 4.5-3 6.5-1 1.5-2 3-2 5.5 0-2.5-1-4-2-5.5-1.5-2-3-4-3-6.5 0-1.5.5-2.8 1-4C14.5 5.5 14 4 16 4z" fill="white"/>
      </svg>
      <h1>Gestión Agrícola</h1>
      <p>Cargando...</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
